<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>螢火蟲的灰燼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=200;300;400;600&display=swap');

        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100dvh; 
            background-color: #000; overflow: hidden;
            font-family: 'Noto Serif TC', serif;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            touch-action: none; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 電影膠卷雜訊 */
        .grain {
            position: fixed; inset: 0;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAtP38+AAAACXBIWXMAAA7EAAAOxAGVKw4bAAAAJklEQVQ4y2NgGAWjYBSMglEwCkbBKBgFo2AUjIJRMApGwSgYBaNgFAwAAwB7AQABK5Sj1AAAAABJRU5ErkJggg==');
            opacity: 0.12; pointer-events: none; z-index: 999;
            animation: grainShift 0.4s steps(2) infinite;
        }
        @keyframes grainShift { 0% { background-position: 0 0; } 100% { background-position: 10px 10px; } }

        /* 起始畫面毛玻璃 */
        #init-screen {
            position: fixed; inset: 0; z-index: 1000; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s ease-in-out; cursor: pointer;
        }
        .init-text {
            color: rgba(255, 255, 255, 0.9); font-size: clamp(1.2rem, 5vw, 1.5rem);
            letter-spacing: 0.5em; font-weight: 300; margin-left: 0.5em;
            animation: pulse-slow 4s infinite; text-shadow: 0 0 20px rgba(255,255,255,0.6);
            text-align: center; white-space: nowrap;
        }
        .init-subtext {
            color: rgba(255, 255, 255, 0.5); font-size: 0.8rem; letter-spacing: 0.2em; margin-top: 4vh;
            text-align: center;
        }

        #webgl-container { position: absolute; inset: 0; z-index: 1; }

        /* 極致壓迫的黑暗邊緣 (Vignette) */
        #darkness-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 2;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%);
            transition: opacity 4s ease-in-out;
        }

        #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .instruction {
            position: absolute; bottom: 8%; color: rgba(255, 255, 255, 0.8);
            font-size: clamp(0.85rem, 3.5vw, 1rem); letter-spacing: 0.4em;
            animation: pulse-slow 4s infinite; text-align: center;
            transition: opacity 2s ease; text-shadow: 0 0 15px rgba(0,0,0,1);
            width: 85vw; overflow-wrap: break-word; white-space: normal;
        }
        .hidden-hint { opacity: 0; pointer-events: none; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* 故事覆蓋層 */
        #story-overlay {
            position: fixed; inset: 0; z-index: 100;
            background-color: rgba(0, 0, 0, 0.88); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        #story-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* ---------------------------------------------------- */
        /* 絕對防跑版的電影字幕排版 (詩意換行 + Balance) */
        /* ---------------------------------------------------- */
        .story-text-container { 
            width: 95vw; /* 擴大安全寬度，避免過早換行 */
            max-width: 700px; 
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        #action-text {
            color: #999; font-size: clamp(0.9rem, 4.5vw, 1.15rem); letter-spacing: 0.15em; line-height: 2;
            margin-bottom: 5vh; opacity: 0; transition: opacity 2s ease, filter 2s ease;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 3vh;
            font-weight: 300; filter: blur(5px);
            
            display: block; width: 100%; text-align: center;
            overflow-wrap: break-word; word-break: normal; white-space: normal;
            text-wrap: balance; /* 讓多行文字視覺上完美平衡置中 */
        }
        #action-text.show { opacity: 1; filter: blur(0px); }
        
        #quote-text {
            color: #ffcc66; font-size: clamp(1.15rem, 5.5vw, 1.6rem); letter-spacing: 0.1em; line-height: 2.2;
            text-shadow: 0 0 25px rgba(255, 204, 102, 0.4); min-height: 25vh; font-weight: 300;
            
            display: block; width: 100%; text-align: center;
            overflow-wrap: break-word; word-break: normal; white-space: normal;
            line-break: strict; /* 嚴格禁止標點符號出現在行首 */
        }
        
        .typewriter-cursor::after {
            content: '|'; color: #ffcc66; animation: blink 1s step-end infinite; margin-left: 2px; opacity: 0.8;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 最終希望文字 */
        #final-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; transition: opacity 6s ease-in; z-index: 15; pointer-events: none; 
            width: 90vw; max-width: 800px; box-sizing: border-box;
        }
        #final-text {
            font-size: clamp(1.8rem, 8vw, 4rem); font-weight: 300; letter-spacing: 0.3em;
            color: #fff; text-shadow: 0 0 50px rgba(255, 200, 100, 1), 0 0 100px rgba(255, 100, 50, 0.6);
            margin-bottom: 4vh; margin-left: 0.15em;
            display: block; overflow-wrap: break-word; white-space: normal; line-height: 1.5;
            text-wrap: balance;
        }
        #final-subtext {
            font-size: clamp(0.9rem, 4vw, 1.4rem); color: rgba(255, 220, 150, 0.95);
            letter-spacing: 0.3em; font-weight: 200; margin-left: 0.15em; text-shadow: 0 0 15px #000;
            display: block; overflow-wrap: break-word; white-space: normal; line-height: 2;
            text-wrap: balance;
        }

        /* 巨大震波漣漪 */
        .ripple {
            position: absolute; border: 2px solid rgba(255, 220, 100, 0.9);
            border-radius: 50%; transform: translate(-50%, -50%) scale(0);
            pointer-events: none; z-index: 5;
            animation: ripple-anim 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes ripple-anim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; box-shadow: 0 0 80px rgba(255, 180, 50, 1) inset; border-width: 6px; }
            50% { opacity: 0.6; border-width: 2px; }
            100% { transform: translate(-50%, -50%) scale(15); opacity: 0; box-shadow: 0 0 0px rgba(255, 150, 50, 0) inset; border-width: 0px; }
        }
    </style>
</head>
<body>

    <div class="grain"></div>

    <div id="init-screen">
        <div class="init-text">輕觸畫面，進入廢墟</div>
        <div class="init-subtext">強烈建議佩戴耳機，感受極致沈浸</div>
    </div>

    <div id="darkness-overlay"></div>
    <div id="webgl-container"></div>
    
    <div id="ui-layer">
        <div id="hint-text" class="instruction hidden-hint">滑動環視四周，點擊飛灰釋放思念</div>
        
        <div id="final-container">
            <div id="final-text">一切都會變得更好</div>
            <div id="final-subtext">那些未曾送達的愛，<br>終將化作漫天星火照亮黑夜</div>
        </div>
    </div>

    <div id="story-overlay">
        <div class="story-text-container">
            <p id="action-text"></p>
            <div id="quote-text"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 360 環景圖檔名設定
        // ==========================================
        const PANORAMA_IMAGE_URL = 'ruin.jpg';
        
        // --- 音效引擎 (Tone.js) ---
        let isAudioReady = false;
        let droneSynth, hopePad, chimeSynth, typeNoise, bgNoise, bgFilter, boomSynth;

        // ==========================================
        // 【核心新增】iOS 前台後台主動喚醒防凍結系統
        // ==========================================
        function resumeAudioEngine() {
            if (isAudioReady) {
                console.log("偵測到 App 重新開啟，正在嘗試強力重啟音訊...");
                // 1. 重啟 Tone.js 的 AudioContext
                if (typeof Tone !== 'undefined' && Tone.context) {
                    if (Tone.context.state !== 'running') {
                        Tone.context.resume().then(() => {
                            console.log("Tone.js 成功復原！");
                        }).catch(e => console.error("Tone.js 重啟失敗:", e));
                    }
                }
                // 2. 重置背景時鐘防止動畫時間跳躍
                if (typeof clock !== 'undefined') {
                    // 暫停一下再重啟，避免時間差產生的計算錯誤
                    clock.getDelta(); 
                }
            }
        }

        // 監聽網頁原生的狀態改變（解鎖螢幕、切換焦點、回到視窗）
        window.addEventListener('pageshow', resumeAudioEngine);
        window.addEventListener('focus', resumeAudioEngine);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                resumeAudioEngine();
            }
        });

        // 接收來自 Xcode SwiftUI 傳入的強行解凍事件
        window.addEventListener('message', (event) => {
            if (event.data === 'app-will-enter-foreground') {
                resumeAudioEngine();
            }
        });

        async function initAudio() {
            if (isAudioReady) return;
            try {
                await Tone.start();
                bgFilter = new Tone.Filter(300, "lowpass").toDestination();
                bgNoise = new Tone.Noise("pink").connect(bgFilter);
                bgNoise.volume.value = -12;

                droneSynth = new Tone.FMSynth({
                    harmonicity: 0.5, modulationIndex: 5,
                    oscillator: { type: "sine" }, modulation: { type: "triangle" },
                    envelope: { attack: 4, decay: 2, sustain: 1, release: 5 }
                }).toDestination();
                droneSynth.volume.value = -15;

                const reverb = new Tone.Reverb({ decay: 10, wet: 0.7 }).toDestination();
                
                hopePad = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sine" }, envelope: { attack: 3, decay: 2, sustain: 0.8, release: 5 }
                }).connect(reverb);
                hopePad.volume.value = -Infinity;

                chimeSynth = new Tone.PolySynth(Tone.MetalSynth, {
                    frequency: 250, envelope: { attack: 0.01, decay: 2, release: 2 },
                    harmonicity: 4.5, modulationIndex: 20, resonance: 4000, octaves: 1.5
                }).connect(reverb);
                chimeSynth.volume.value = -12;

                boomSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.08, octaves: 6, oscillator: { type: "sine" },
                    envelope: { attack: 0.001, decay: 2.5, sustain: 0, release: 2 }
                }).connect(reverb);
                boomSynth.volume.value = -5;

                typeNoise = new Tone.NoiseSynth({
                    noise: { type: 'brown' }, envelope: { attack: 0.005, decay: 0.05, sustain: 0, release: 0.05 }
                }).toDestination();
                typeNoise.volume.value = -22;

                isAudioReady = true;
                bgNoise.start();
                droneSynth.triggerAttack("C2");
                hopePad.triggerAttack(["C3", "G3"]);
            } catch (error) { console.error("Audio init failed:", error); }
        }

        let isStoryActive = false;
        let isEnding = false;
        let currentStoryIndex = 0;

        // 【終極排版解法】：利用 \n 精準控制詩意斷句，避免單字孤立。
        const warMessages = [
            { action: "你撥開瓦礫，觸碰了一面碎裂的螢幕。\n微弱的亮光，宛如它不甘的脈搏。", quote: "「電量剩 2%。\n如果我沒能出去，請幫我照顧好媽媽。」" },
            { action: "灰燼掩埋著一個失去溫度的鐵盒，\n裡頭正反覆重播著最後的牽掛。", quote: "「地下室的空氣越來越稀薄了。\n小寶，爸爸永遠愛你，\n你要勇敢。」" },
            { action: "你拾起一張被戰火燒毀一半的紙條，\n上面的字跡早已因淚水而暈染開來。", quote: "「外面終於安靜下來了，\n但我不敢出去。\n好冷。」" },
            { action: "在沒有訊號的荒原裡，\n一個紅色驚嘆號將最後的愛意，\n永遠困在了發件匣。", quote: "「他們說救援不會來了。\n我們把最後的水留給了孩子。」" },
            { action: "在最深最深的黑夜中，\n一卷底片記錄下了他們對黎明最後的渴望。", quote: "「天亮了。\n這可能是我最後一次看到日出...」" }
        ];

        // --- Three.js 系統與 360 環景 ---
        const container3D = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        let currentFov = 70;
        let targetFov = 70;
        const camera = new THREE.PerspectiveCamera(currentFov, window.innerWidth / window.innerHeight, 0.1, 1800);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container3D.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();
        const panoramaGeo = new THREE.SphereGeometry(900, 60, 40); // 稍微放大環景球體
        panoramaGeo.scale(-1, 1, 1); 
        
        const panoramaMaterial = new THREE.MeshBasicMaterial({
            map: textureLoader.load(PANORAMA_IMAGE_URL),
            color: 0x333333 // 初始更深沉，強化後續對比
        });
        const panoramaMesh = new THREE.Mesh(panoramaGeo, panoramaMaterial);
        scene.add(panoramaMesh);

        // ==========================================
        // 歷史級突破！80,000 顆粒子的極致螢火蟲之墓氛圍
        // ==========================================
        const particleCount = 300000; 
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const particleData = [];

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.1, 'rgba(255, 240, 180, 1)');
            grad.addColorStop(0.4, 'rgba(255, 130, 40, 0.5)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
            return new THREE.CanvasTexture(canvas);
        }

        const fireflyColors = [0xffcc44, 0xffee88, 0xff9922, 0xffffaa, 0xffbb55]; 

        for (let i = 0; i < particleCount; i++) {
            // 在更廣闊的 3D 空間中均勻分佈
            positions[i * 3] = (Math.random() - 0.5) * 1500;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 1500;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 1500; 

            // 驚人的 35% 比例 (約 17,500顆) 一開始就已點亮！
            let isPreLit = Math.random() < 0.35;
            
            if (isPreLit) {
                let randomColor = fireflyColors[Math.floor(Math.random() * fireflyColors.length)];
                let c = new THREE.Color(randomColor);
                colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
                sizes[i] = Math.random() * 8 + 4; // 發光粒子大且顯眼
            } else {
                colors[i * 3] = 0.15 + Math.random() * 0.05;
                colors[i * 3 + 1] = 0.15 + Math.random() * 0.05;
                colors[i * 3 + 2] = 0.2 + Math.random() * 0.1;
                sizes[i] = Math.random() * 2.5 + 1; // 灰燼
            }

            particleData.push({
                velocity: isPreLit 
                    ? new THREE.Vector3((Math.random()-0.5)*0.6, Math.random()*0.8 + 0.2, (Math.random()-0.5)*0.6) 
                    : new THREE.Vector3((Math.random()-0.5)*0.1, -Math.random()*0.5 - 0.1, (Math.random()-0.5)*0.1),
                isAwake: isPreLit,
                targetColor: new THREE.Color(isPreLit ? fireflyColors[Math.floor(Math.random() * fireflyColors.length)] : 0x000000),
                currentColor: new THREE.Color(colors[i*3], colors[i*3+1], colors[i*3+2]),
                baseSize: isPreLit ? sizes[i] : (sizes[i] * 5), 
                phase: Math.random() * Math.PI * 2 
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 3.5, map: createGlowTexture(), vertexColors: true,
            transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 360 滑動控制與點擊邏輯 ---
        let isDragging = false;
        let dragDistance = 0;
        let pointerDownX = 0, pointerDownY = 0;
        let lon = 0, lat = 0; 
        let savedLon = 0, savedLat = 0;

        container3D.addEventListener('pointerdown', (e) => {
            if (document.getElementById('init-screen').style.display !== 'none' || isStoryActive) return;
            isDragging = true;
            dragDistance = 0;
            pointerDownX = e.clientX;
            pointerDownY = e.clientY;
            savedLon = lon;
            savedLat = lat;
        });

        container3D.addEventListener('pointermove', (e) => {
            if (isDragging) {
                lon = savedLon - (e.clientX - pointerDownX) * 0.15;
                lat = savedLat + (e.clientY - pointerDownY) * 0.15;
                dragDistance += Math.abs(e.movementX) + Math.abs(e.movementY);
            }
        });

        container3D.addEventListener('pointerup', (e) => {
            isDragging = false;
            if (dragDistance < 15 && !isStoryActive && !isEnding && document.getElementById('init-screen').style.display === 'none') {
                handleTapInteraction(e.clientX, e.clientY);
            }
        });

        document.getElementById('init-screen').addEventListener('click', async () => {
            await initAudio();
            const initScreen = document.getElementById('init-screen');
            initScreen.style.opacity = '0';
            setTimeout(() => {
                initScreen.style.display = 'none';
                document.getElementById('hint-text').classList.remove('hidden-hint');
            }, 2000);
        });

        // 點擊觸發邏輯：引爆 4,000 ~ 8,000 顆！真實星爆感
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 200; 
        let typeWriterTimer;

        function handleTapInteraction(clientX, clientY) {
            document.getElementById('hint-text').classList.add('hidden-hint');

            let mouse3D = new THREE.Vector2();
            mouse3D.x = (clientX / window.innerWidth) * 2 - 1;
            mouse3D.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse3D, camera);
            const intersects = raycaster.intersectObject(particles);

            let hitPoint = new THREE.Vector3();
            if (intersects.length > 0) {
                hitPoint.copy(intersects[0].point);
            } else {
                camera.getWorldDirection(hitPoint);
                hitPoint.multiplyScalar(500 + Math.random()*200).add(camera.position);
            }

            // 鏡頭強烈震波特效
            currentFov = 105; 
            targetFov = 70;  

            // 引爆海量螢火蟲群
            let awakenCount = 0;
            let burstAmount = 4000 + Math.random() * 4000; 
            
            for(let i=0; i<particleCount; i++) {
                if(!particleData[i].isAwake) {
                    let px = positions[i*3], py = positions[i*3+1], pz = positions[i*3+2];
                    let distSq = (px-hitPoint.x)**2 + (py-hitPoint.y)**2 + (pz-hitPoint.z)**2;
                    
                    if(distSq < 600000 || awakenCount < 800) { 
                        awakenParticle(i);
                        awakenCount++;
                        if(awakenCount >= burstAmount) break;
                    }
                }
            }

            createRipple(clientX, clientY);

            if (isAudioReady) {
                if(chimeSynth) chimeSynth.triggerAttackRelease(chimeNotes[currentStoryIndex % chimeNotes.length], "1n"); 
                if(boomSynth) boomSynth.triggerAttackRelease("C1", "1n"); 
            }
            
            if(navigator.vibrate) navigator.vibrate([120, 40, 100, 30, 180]); 

            if (currentStoryIndex < warMessages.length) {
                openStory(warMessages[currentStoryIndex]);
                currentStoryIndex++;
            }
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 2500);
        }

        const chimeNotes = ["C5", "E5", "G5", "B5", "D6"];

        function awakenParticle(idx) {
            const p = particleData[idx];
            p.isAwake = true;
            p.targetColor.setHex(fireflyColors[Math.floor(Math.random() * fireflyColors.length)]); 
            sizes[idx] = p.baseSize * (Math.random() * 4 + 1.5); 
            
            p.velocity.set(
                (Math.random()-0.5) * 15, 
                Math.random() * 10 + 3, 
                (Math.random()-0.5) * 15
            );
            geometry.attributes.size.needsUpdate = true;
        }

        const storyOverlay = document.getElementById('story-overlay');
        const actionEl = document.getElementById('action-text');
        const quoteEl = document.getElementById('quote-text');
        const darknessOverlay = document.getElementById('darkness-overlay');

        function openStory(messageData) {
            isStoryActive = true;
            clearTimeout(typeWriterTimer);
            
            actionEl.innerHTML = messageData.action.replace(/\n/g, '<br>');
            actionEl.classList.remove('show');
            quoteEl.innerHTML = '';
            quoteEl.classList.add('typewriter-cursor');
            storyOverlay.classList.add('active');

            if(isAudioReady && droneSynth) droneSynth.volume.rampTo(-25, 2);

            setTimeout(() => { actionEl.classList.add('show'); }, 1500); 

            setTimeout(() => {
                let i = 0;
                function typeWriter() {
                    if (i < messageData.quote.length) {
                        let char = messageData.quote.charAt(i);
                        
                        // 正確處理手動換行符號
                        if (char === '\n') {
                            quoteEl.innerHTML += '<br>';
                        } else {
                            quoteEl.innerHTML += char;
                        }
                        
                        if (char.trim() !== '' && char !== '\n' && !['，', '。'].includes(char)) {
                            if(navigator.vibrate) navigator.vibrate(5); 
                            if(isAudioReady && typeNoise) typeNoise.triggerAttackRelease("32n");
                        }
                        
                        i++;
                        let delay = (['，', '。', '？', '！', '...'].includes(char)) ? 450 : Math.random() * 60 + 40;
                        typeWriterTimer = setTimeout(typeWriter, delay);
                    } else {
                        quoteEl.classList.remove('typewriter-cursor');
                        setTimeout(closeStory, 3500); 
                    }
                }
                typeWriter();
            }, 3500); 
        }

        function closeStory() {
            storyOverlay.classList.remove('active');
            
            let progress = currentStoryIndex / warMessages.length;
            darknessOverlay.style.opacity = 1 - progress;
            
            let colorIntensity = Math.floor(51 + (progress * 204)); // 從極暗過渡到全白
            let colorHex = (colorIntensity << 16) | (colorIntensity << 8) | colorIntensity;
            panoramaMaterial.color.setHex(colorHex);

            if(isAudioReady) {
                droneSynth.volume.rampTo(-18, 3);
                droneSynth.frequency.rampTo(100 + progress * 100, 3);
                hopePad.volume.rampTo(-20 + (progress * 10), 4);
                bgFilter.frequency.rampTo(300 + (progress * 800), 2);
            }

            setTimeout(() => { 
                isStoryActive = false; 
                if (currentStoryIndex >= warMessages.length) {
                    triggerEnding();
                }
            }, 1500);
        }

        function triggerEnding() {
            isEnding = true;

            // 結局：喚醒全部 50,000 顆！這會是視覺的盛宴
            for (let i = 0; i < particleCount; i++) {
                const p = particleData[i];
                if(!p.isAwake) {
                    p.isAwake = true;
                    p.targetColor.setHex(fireflyColors[Math.floor(Math.random() * fireflyColors.length)]);
                    p.velocity.set((Math.random()-0.5)*3.5, Math.random()*6 + 2, (Math.random()-0.5)*3.5); 
                    sizes[i] = p.baseSize * (Math.random() * 2.5 + 1);
                }
            }
            geometry.attributes.size.needsUpdate = true;
            
            darknessOverlay.style.opacity = '0';
            panoramaMaterial.color.setHex(0xffffff); 

            if(isAudioReady) {
                droneSynth.volume.rampTo(-Infinity, 5); 
                bgNoise.volume.rampTo(-Infinity, 5);
                hopePad.volume.rampTo(-3, 3); 
                hopePad.triggerAttack(["C4", "E4", "G4", "B4"], "+1"); 
            }

            if(navigator.vibrate) navigator.vibrate([100, 50, 150, 50, 200, 100, 300, 100, 500, 200, 800]);

            setTimeout(() => {
                document.getElementById('final-container').style.opacity = '1';
            }, 6000);
        }

        // --- 動畫迴圈 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (currentFov !== targetFov) {
                currentFov += (targetFov - currentFov) * 0.05;
                camera.fov = currentFov;
                camera.updateProjectionMatrix();
            }

            const time = clock.getElapsedTime();
            let swayX = Math.sin(time * 0.5) * 5;
            let swayY = Math.cos(time * 0.3) * 5;

            if (!isDragging && !isStoryActive) {
                lon += 0.04; 
            }

            lat = Math.max(-85, Math.min(85, lat)); 
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            
            camera.lookAt(
                500 * Math.sin(phi) * Math.cos(theta) + swayX,
                500 * Math.cos(phi) + swayY,
                500 * Math.sin(phi) * Math.sin(theta)
            );

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;

            for (let i = 0; i < particleCount; i++) {
                const p = particleData[i];

                positions[i * 3] += p.velocity.x;
                positions[i * 3 + 1] += p.velocity.y;
                positions[i * 3 + 2] += p.velocity.z;

                if (positions[i * 3 + 1] < -750 && !p.isAwake) {
                    positions[i * 3 + 1] = 750; 
                } else if (positions[i * 3 + 1] > 750 && p.isAwake) {
                    positions[i * 3 + 1] = -750; 
                }

                if (p.isAwake) {
                    if (isEnding) {
                        const radius = Math.sqrt(positions[i*3]*positions[i*3] + positions[i*3+2]*positions[i*3+2]);
                        const angle = Math.atan2(positions[i*3+2], positions[i*3]);
                        const newAngle = angle + (0.015 * (200/Math.max(radius, 10))); 
                        positions[i * 3] = Math.cos(newAngle) * radius;
                        positions[i * 3 + 2] = Math.sin(newAngle) * radius;
                        positions[i * 3 + 1] += Math.random() * 1.5; 
                    } else {
                        p.velocity.x *= 0.93;
                        p.velocity.z *= 0.93;
                        if (p.velocity.y > 0.4) p.velocity.y *= 0.94; 
                        
                        positions[i * 3] += Math.sin(time * 1.5 + i) * 0.8; 
                    }

                    p.currentColor.lerp(p.targetColor, 0.08); 
                    
                    let flicker = 0.5 + Math.sin(time * 6 + p.phase) * 0.5; 
                    colAttr.setXYZ(i, p.currentColor.r * flicker, p.currentColor.g * flicker, p.currentColor.b * flicker);
                }
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            particles.rotation.y = time * 0.01;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
